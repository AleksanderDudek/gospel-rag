# Render deployment config
# Free tier: web services spin down after 15 min idle.
# Set up env vars in the Render dashboard: ANTHROPIC_API_KEY, VOYAGE_API_KEY, DATABASE_URL

services:
  - type: web
    name: gospel-rag-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set in dashboard
      - key: VOYAGE_API_KEY
        sync: false   # set in dashboard
      - key: DATABASE_URL
        sync: false   # Neon connection string — set in dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # your Vercel frontend URL
      - key: SECRET_KEY
        generateValue: true

  # Frontend deployed on Vercel — set BACKEND_INTERNAL_URL=https://gospel-rag-api.onrender.com there
