name: Keep Alive

# Ping the API every 14 minutes to prevent Render free-tier idle spin-down (threshold: 15 min).
on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    name: Ping API
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://gospel-rag-api.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — service may be cold-starting or down"
          fi
