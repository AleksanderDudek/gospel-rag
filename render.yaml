# Render deployment config
# Free tier: web services spin down after 15 min idle.
# Set up env vars in the Render dashboard: ANTHROPIC_API_KEY, VOYAGE_API_KEY, DATABASE_URL

services:
  - type: web
    name: gospel-rag-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set in dashboard
      - key: VOYAGE_API_KEY
        sync: false   # set in dashboard
      - key: DATABASE_URL
        sync: false   # Neon connection string — set in dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # https://gospel-rag-web.onrender.com (update after web service is live)
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: gospel-rag-web
    runtime: node
    rootDir: ./web
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    startCommand: node_modules/.bin/next start -p $PORT
    plan: free
    envVars:
      - key: BACKEND_INTERNAL_URL
        sync: false   # set to https://gospel-rag-api.onrender.com in dashboard
      - key: NEXT_PUBLIC_APP_NAME
        value: "Gospel RAG"
      - key: NODE_ENV
        value: production
