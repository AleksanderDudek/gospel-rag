version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gospel
      POSTGRES_PASSWORD: gospel
      POSTGRES_DB: gospel_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gospel -d gospel_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gospel:gospel@postgres:5432/gospel_rag
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://app:8000
      NEXT_PUBLIC_APP_NAME: "Gospel RAG"
    depends_on:
      - app
    restart: unless-stopped

  # Optional: Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability   # Only start with: docker compose --profile observability up

volumes:
  pgdata:
