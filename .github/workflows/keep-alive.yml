name: Keep Alive

# Ping both services every 5 minutes to prevent Render free-tier idle spin-down (threshold: 15 min).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  ping-api:
    name: Ping API
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://gospel-rag-api.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — API may be cold-starting or down"
          fi

  ping-web:
    name: Ping Web
    runs-on: ubuntu-latest
    steps:
      - name: Ping web service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://gospel-rag-web.onrender.com)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — web may be cold-starting or down"
          fi
